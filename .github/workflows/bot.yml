name: Gold Bot
on:
  schedule:
    - cron: '0,30 8-20 * * 1-5'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python main.py
        timeout-minutes: 3
